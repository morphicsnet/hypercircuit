run:
  # Week 1 registry/run metadata
  output_dir: "runs"
  run_id: "mock"
  seeds: [0, 1, 2, 3, 4]
  stage: null
  model_tag: "debug"
  task_family: null
  split: "dev"
  intent: "dev"
  # Legacy knobs (still honored by CLIs as fallback)
  seed: 0
  run_dir: "runs/mock"
  mock: true
  timestamped: false

dataset:
  name: synthetic_parity
  n_samples: 64
  n_features: 8
  variant: "tiny"
  source: "mock"

logging:
  mode: "mock"
  member_granularity: "node_type"
  source_kind: "mock"
  # Mock logger knobs used by ActivationLogger
  tokens_per_sample: 8
  threshold: 0.5
  hysteresis: 0.05
  sparsity: 0.1
  storage: jsonl

model:
  hf_model: null
  device: "cpu"
  dtype: "float32"
  batch_size: 4
  max_length: 256
  layers: null
  activation_kind: "residual"

sae:
  format: "safetensors"
  path: null
  layer_map: null
  top_k: 16
  min_activation: 0.0
  dictionary_id: null
  dictionary_version: null
  dictionary_type: "sae"
  feature_space_id: null
  feature_space_version: "v0"

reconciliation:
  enabled: false
  method: "identity"
  out_alignment: "feature_alignment.json"
  out_consensus: "consensus_features.json"
  out_events: "events_reconciled.jsonl"
  out_manifest: "events_reconciled_manifest.json"

discovery:
  # Back-compat knobs used by scaffolding
  min_support: 2
  max_set_size: 3
  candidate_cap: 50
  synergy_threshold: -0.5

surrogate:
  nonneg: true
  cv_folds: 3
  selection: aic
  interactions: 0

causal:
  ablation_strength: 1.0
  patch_window: 4
  subset_size: 16

editing:
  scale: 0.3
  clamp: null
  rollback_delta: 0.05
